services:
  - type: web
    name: syprint3d
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      - key: AUTH_EMAIL
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTH_NAME
        value: Administrador
      - key: AUTH_WHATSAPP
        value: ''